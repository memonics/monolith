name: BDRA Architecture Governance Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  governance:
    name: Enforce Ring and Layer Boundaries
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Go Runtime Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run Lightning-Fast Zero-Mock Unit Tests
      run: make test

    - name: Install BDRA Static Analysis Linter Engine
      run: go install github.com/bdra-io/bdra-spec/tools/bdracheck@latest

    - name: Execute AST Invariant Verification
      run: bdracheck verify --config=bdracheck.json